<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
</head>

<style>body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
}

.container {
    width: 85%;
    margin: auto;
}

.checkout-grid {
    display: flex;
    gap: 30px;
}

.left {
    flex: 2;
}

.right {
    flex: 1;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

.place-order {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 15px;
    cursor: pointer;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo a {
    font-size: 24px;
    font-weight: bold;
    color: black;
    text-decoration: none;
}


/* SEARCH */
.search-box {
    flex: 1;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 420px;
    padding: 10px 16px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
}

/* RIGHT NAV */
.nav-right {
    display: flex;
    align-items: center;
    gap: 22px;
}

.nav-right a {
    text-decoration: none;
    color: #000;
    font-weight: 500;
}

.icon {
    position: relative;
    font-size: 20px;
    cursor: pointer;
    display: inline-block;
}

/* CART BADGE */
.cart span {
    position: absolute;
    top: -6px;
    right: -10px;
    background: red;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* USER */
.user-name {
    font-size: 14px;
    margin-left: 4px;
}
/* ---------- PRODUCTS ---------- */
.container {
    padding: 24px;
}

.products-count {
    margin-bottom: 16px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}
/* Container */
.category-dropdown, .profile-dropdown {
    position: relative;
    display: inline-block;
}

/* Button */
.category-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    font-weight: 600;
}

/* Dropdown menu */
.dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 6px;
    z-index: 1000;
}

/* Each category item */
.dropdown-menu a {
    display: block;
    padding: 10px 14px;
    text-decoration: none;
    color: black;
}

.dropdown-menu a:hover {
    background-color: #f2f2f2;
}

.profile-dropdown:hover .dropdown-menu {
    display: block;
}

/* Show dropdown on hover */
.category-dropdown:hover .dropdown-menu {
    display: block;
}

/* Container */
.category-dropdown, .profile-dropdown {
    position: relative;
    display: inline-block;
}

/* Button */
.category-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    font-weight: 600;
}

/* Dropdown menu */
.dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 6px;
    z-index: 1000;
}

/* Each category item */
.dropdown-menu a {
    display: block;
    padding: 10px 14px;
    text-decoration: none;
    color: black;
}

.dropdown-menu a:hover {
    background-color: #f2f2f2;
}

.profile-dropdown:hover .dropdown-menu {
    display: block;
}

/* Show dropdown on hover */
.category-dropdown:hover .dropdown-menu {
    display: block;
}
</style>
<body>

    <header class="header">
    <div class="logo"><a th:href="@{/users/home}">BuyIT</a></div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="nav-right">
  <div class="category-dropdown">
    <button class="category-btn">Categories ⬇</button>

    <div class="dropdown-menu">
        <a th:each="cat : ${categories}" th:text="${cat}" th:href="@{/users/categories/{category}(category=${cat})}"></a>
    </div>
</div>




        <a th:href="@{/users/deals}">Deals</a>

        <div class="icon cart">
            <a th:href="@{/users/cart}">
            🛒
            <span id="cart-count" th:text="${cartCount}"></span></a>
        </div>
        <div><a th:href="@{/users/orders}">ORDERS</a></div>
        <div class="profile-dropdown">
        <div class="icon">
            👤</div>
            <span class="user-name" th:text="${username}"></span>
            <div class="dropdown-menu">
                <a th:href="@{/users/profile}">Profile</a>
                <a th:href="@{/users/settings}">Settings</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        
        </div>
    </div>
</header>
<div class="container">

    <h2>Checkout</h2>

    <div class="checkout-grid">

        <!-- LEFT : ADDRESS + PAYMENT -->
        <div class="left">

            <section class="box">
                <h3>Shipping Address</h3>
<form th:action="@{/users/checkout}" method="post" class="checkout-form">

    <input type="text"
           name="fullname"
           placeholder="Full Name"
           th:value="${address != null ? address.fullname : ''}"
           required>

    <input type="text"
           name="addressLine"
           placeholder="Address Line"
           th:value="${address != null ? address.addressLine : ''}"
           required>

    <input type="text"
           name="city"
           placeholder="City"
           th:value="${address != null ? address.city : ''}"
           required>

    <input type="text"
           name="state"
           placeholder="State"
           th:value="${address != null ? address.state : ''}"
           required>

    <input type="text"
           name="pinCode"
           placeholder="Pincode"
           th:value="${address != null ? address.pinCode : ''}"
           required>

    <input type="text"
           name="phoneNumber"
           placeholder="Phone Number"
           th:value="${address != null ? address.phoneNumber : ''}"
           required>

    <label class="save-address">
        <input type="checkbox" name="saveAddress" value="true">
        Save this address for future orders
    </label>

    <button type="submit">Save Address</button>
</form>


            </section>
        
            <section class="box">
                <h3>Payment Method</h3>

                <label>
                    <input type="radio" name="payment" checked>
                    Cash on Delivery
                </label>

                <label>
                    <input type="radio" name="payment">
                    UPI / Card (Mock)
                </label>
            </section>

        </div>

        <!-- RIGHT : ORDER SUMMARY -->
        <div class="right box">

            <h3>Order Summary</h3>

            <div th:each="item : ${cartItems}" class="summary-item">
                <span th:text="${item.product.name}"></span>
                <span>₹ <span th:text="${item.product.price * item.quantity}"></span></span>
            </div>

            <hr>

            <div class="row">
                <span>Subtotal</span>
                <span>₹ <span th:text="${total}"></span></span>
            </div>

            <div class="row">
                <span>Tax</span>
                <span>₹ <span th:text="${0.025*total}"></span></span>
            </div>

            <div class="row total">
                <span>Total</span>
                <span>₹ <span th:text="${total+(0.025*total)}"></span></span>
            </div>

            <a th:href="@{/users/placeorder}">
                <button type="submit" class="place-order">
                    Place Order
                </button>
            </a>
        </div>

    </div>
</div>

</body>
</html>
