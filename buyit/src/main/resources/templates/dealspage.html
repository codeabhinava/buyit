<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BuyIT - Deals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #f6f7fb;
}

/* HEADER */
.header {
    padding: 14px 32px;
    background: white;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

/* BANNER */
.deals-banner {
    margin: 20px;
    padding: 30px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    color: white;
    text-align: center;
}

.deals-banner h1 {
    font-size: 32px;
}

/* GRID */
.container {
    padding: 24px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
    position: relative;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
}

/* DISCOUNT BADGE */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    color: white;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.card h3 {
    font-size: 16px;
    margin: 10px 0 4px;
}

.price {
    font-weight: bold;
    color: green;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    font-size: 13px;
}

.add-btn {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="header">
    <div class="logo"><a th:href="@{/users/home}">BuyIT</a></div>
    <h2>🔥 Hot Deals</h2>
</header>

<div class="deals-banner">
    <h1>Today's Best Deals</h1>
    <p>Save big on top products!</p>
</div>

<div class="container">
    <div class="grid">

        <!-- Deal Card -->
        <div class="card" th:each="deal : ${deals}">
            <span class="badge" th:text="'-' + ${deal.discount} + '%'"></span>
            <img th:src="${deal.imageLink}" alt="Product">
            <h3 th:text="${deal.name}"></h3>

            <p class="price" th:text="'₹ ' + ${deal.discountPrice}"></p>
            <p class="old-price" th:text="'₹ ' + ${deal.originalPrice}"></p>

            <button class="add-btn">Add to Cart</button>
        </div>

        <!-- Static demo cards (remove later) -->
        <div class="card">
            <span class="badge">-30%</span>
            <img src="https://via.placeholder.com/300">
            <h3>Wireless Headphones</h3>
            <p class="price">₹ 1399</p>
            <p class="old-price">₹ 1999</p>
            <button class="add-btn">Add to Cart</button>
        </div>

        <div class="card">
            <span class="badge">-50%</span>
            <img src="https://via.placeholder.com/300">
            <h3>Smart Watch</h3>
            <p class="price">₹ 2499</p>
            <p class="old-price">₹ 4999</p>
            <button class="add-btn">Add to Cart</button>
        </div>

        <div class="card">
            <span class="badge">-20%</span>
            <img src="https://via.placeholder.com/300">
            <h3>Bluetooth Speaker</h3>
            <p class="price">₹ 1599</p>
            <p class="old-price">₹ 1999</p>
            <button class="add-btn">Add to Cart</button>
        </div>

    </div>
</div>

</body>
</html>
