<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Manage Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
        }

        header {
            background: #222;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        header h2 {
            margin: 0;
        }

        .container {
            padding: 30px;
        }

        .add-btn {
            background: #2d5be3;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f1f1f1;
        }
        .hidden{
            background: grey;
            color: antiquewhite;
        }
        img {
            width: 70px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        .action-btn {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .edit-btn {
            background: #28a745;
        }

        .delete-btn {
            background: #dc3545;
        }

        .logout {
            color: white;
            text-decoration: none;
        }

    </style>
</head>

<body>

<header>
    <a th:href="@{/admin/dashboard}" class="logout">Admin Dashboard - Products</a>
    <a th:href="@{/logout}" class="logout">Logout</a>
</header>

<div class="container">

    <a th:href="@{/admin/products/add}" class="add-btn">+ Add New Product</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price (₹)</th>
            <th>Stock</th>
            <th>Actions</th>
            <th>Show/Hide</th>
        </tr>
        </thead>

        <tbody>
       <tr th:each="p : ${products}" th:class="${p.show} ? 'visible' : 'hidden'">    
        <td th:text="${p.prodId}"></td>

            <td>
                <img th:src="${p.imageLink}" alt="product">
            </td>

            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>

            <td>
                <a th:href="@{/admin/products/edit/{id}(id=${p.prodId})}">
                    <button class="action-btn edit-btn">Edit</button>
                </a>

                <a th:href="@{/admin/products/delete/{id}(id=${p.prodId})}"
                   onclick="return confirm('Are you sure you want to delete this product?')">
                    <button class="action-btn delete-btn">Delete</button>
                </a>
            </td>
            <form th:action="@{/admin/product/hide/{id}(id=${p.prodId})}" method="post">
                 <td th:if="${p.show}"><button class="action-btn delete-btn">HIDE</button></td>
            </form>
            <form th:action="@{/admin/product/show/{id}(id=${p.prodId})}" method="post">
                 <td th:if="${!p.show}"><button class="action-btn edit-btn">SHOW</button></td>
            </form>
        </tr>

        </tbody>
    </table>

</div>

</body>
</html>
