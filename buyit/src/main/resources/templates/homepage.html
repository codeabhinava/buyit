<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BuyIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #f6f7fb;
    color: #111;
}

/* ---------- NAVBAR ---------- */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

/* SEARCH */
.search-box {
    flex: 1;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 420px;
    padding: 10px 16px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
}

/* RIGHT NAV */
.nav-right {
    display: flex;
    align-items: center;
    gap: 22px;
}

.nav-right a {
    text-decoration: none;
    color: #000;
    font-weight: 500;
}

.icon {
    position: relative;
    font-size: 20px;
    cursor: pointer;
}

/* CART BADGE */
.cart span {
    position: absolute;
    top: -6px;
    right: -10px;
    background: red;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* USER */
.user-name {
    font-size: 14px;
    margin-left: 4px;
}

/* ---------- BANNER ---------- */
.banner {
    margin: 24px;
    padding: 40px;
    border-radius: 20px;
    background: linear-gradient(135deg, #2d5be3, #8f3cf7);
    color: white;
}

.banner h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

/* ---------- PRODUCTS ---------- */
.container {
    padding: 24px;
}

.products-count {
    margin-bottom: 16px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* ---------- CARD ---------- */
.card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
}

.card h3 {
    font-size: 16px;
    margin: 10px 0 4px;
}

.price {
    font-weight: bold;
    margin-top: 6px;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 768px) {
    .search-box {
        display: none;
    }

    .nav-right a {
        display: none;
    }
}

@media (max-width: 480px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>

<body>

<!-- NAVBAR -->
<header class="header">
    <div class="logo"><a th:href="@{/users/home}">BuyIT</a></div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="nav-right">
        <a href="#">Categories</a>
        <a href="#">Deals</a>

        <div class="icon cart">
            <a th:href="@{/users/cart}">
            🛒
            <span id="cart-count" th:text="${cartCount}"></span></a>
        </div>
        <div><a th:href="@{/users/orders}">ORDERS</a></div>
        <div class="icon">
            👤
            <span class="user-name" th:text="${username}"></span>
        </div>
    </div>
</header>

<!-- BANNER -->
<div class="banner">
    <h1>New Year Sale!</h1>
    <p>Up to 50% off on selected items. Limited time offer!</p>
</div>

<!-- PRODUCTS -->
<div class="container">
    <h2>All Products</h2>
    <p class="products-count"
       th:text="${products.size()} + ' products found'"></p>

    <div class="grid">
        <div class="card" th:each="p : ${products}">
            <img th:src="${p.imageLink}" alt="Product">
            <h3 th:text="${p.name}"></h3>
            <p th:text="${p.category}"></p>
            <p class="price" th:text="'₹ ' + ${p.price}"></p>
            <p th:text="'Stock: ' + ${p.quantity}"></p>
            <form th:action="@{/users/home}" method="post" class="cart-form">
    <input type="hidden" name="prod_id" th:value="${p.prodId}" />

    <button type="submit" class="add-btn">
        Add to Cart
    </button>
</form>

        </div>
        
    </div>
</div>

</body>
<script>
    let cartCount = 0;

    function addToCart(button) {
        const productName = button.getAttribute("data-name");

        cartCount++;
        document.getElementById("cart-count").innerText = cartCount;

        // Optional UX feedback
        button.innerText = "Added ✔";
        button.disabled = true;

        setTimeout(() => {
            button.innerText = "Add to Cart";
            button.disabled = false;
        }, 1200);
    }
</script>

</html>
