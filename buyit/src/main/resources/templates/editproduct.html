<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #f4f6fb;
            font-family: Arial, sans-serif;
        }

        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        img {
            width: 120px;
            height: 100px;
            object-fit: cover;
            margin-top: 10px;
            border-radius: 6px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn {
            background: #2d5be3;
            color: white;
        }

        .cancel-btn {
            background: #ccc;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>Edit Product</h2>

    <form th:action="@{/admin/products/update}" method="post" th:object="${product}">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{prodId}"/>

        <label>Product Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Category</label>
        <input type="text" th:field="*{category}" required>

        <label>Price (₹)</label>
        <input type="number" step="0.01" th:field="*{price}" required>

        <label>Stock Quantity</label>
        <input type="number" th:field="*{quantity}" required>

        <label>Image URL</label>
        <input type="text" th:field="*{imageLink}" required>

        <img th:src="*{imageLink}" alt="Product Image"/>

        <div class="btn-group">
            <button type="submit" class="save-btn">Update Product</button>
            <a th:href="@{/admin/products}">
                <button type="button" class="cancel-btn">Cancel</button>
            </a>
        </div>

    </form>

</div>

</body>
</html>
