<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart | BuyIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f6f7fb;
            color: #111;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: white;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .search input {
            width: 420px;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-icon {
            position: relative;
            font-size: 20px;
        }

        .cart-icon span {
            position: absolute;
            top: -6px;
            right: -10px;
            background: black;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* ---------- PAGE ---------- */
        .page {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .back {
            color: #555;
            margin-bottom: 20px;
            display: inline-block;
            text-decoration: none;
        }

        h1 {
            margin-bottom: 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        /* ---------- CART LIST ---------- */
        .cart-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-info {
            flex: 1;
        }

        .cart-info h3 {
            margin: 0 0 6px;
        }

        .stock {
            color: green;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .price-box {
            text-align: right;
        }

        .price-box .each {
            color: #555;
            font-size: 14px;
        }

        .price-box .total {
            font-size: 20px;
            font-weight: bold;
        }

        .remove {
            margin-top: 10px;
            color: #888;
            cursor: pointer;
            font-size: 14px;
        }

        /* ---------- SUMMARY ---------- */
        .summary {
            background: white;
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
        }

        .summary h3 {
            margin-bottom: 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        .green {
            color: green;
        }

        .total-row {
            font-size: 22px;
            font-weight: bold;
            margin-top: 16px;
        }

        .checkout {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .continue {
            margin-top: 12px;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .features {
            margin-top: 20px;
            font-size: 14px;
            color: #444;
        }

        .features div {
            margin-bottom: 8px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .search input {
                display: none;
            }
        }
        
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo a {
    font-size: 24px;
    font-weight: bold;
    color: black;
    text-decoration: none;
}


/* SEARCH */
.search-box {
    flex: 1;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 420px;
    padding: 10px 16px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
}

/* RIGHT NAV */
.nav-right {
    display: flex;
    align-items: center;
    gap: 22px;
}

.nav-right a {
    text-decoration: none;
    color: #000;
    font-weight: 500;
}

.icon {
    position: relative;
    font-size: 20px;
    cursor: pointer;
    display: inline-block;
}

/* CART BADGE */
.cart span {
    position: absolute;
    top: -6px;
    right: -10px;
    background: red;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 50%;
}

/* USER */
.user-name {
    font-size: 14px;
    margin-left: 4px;
}
/* ---------- PRODUCTS ---------- */
.container {
    padding: 24px;
}

.products-count {
    margin-bottom: 16px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* Container */
.category-dropdown, .profile-dropdown {
    position: relative;
    display: inline-block;
}

/* Button */
.category-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    font-weight: 600;
}

/* Dropdown menu */
.dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background-color: white;
    min-width: 160px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 6px;
    z-index: 1000;
}

/* Each category item */
.dropdown-menu a {
    display: block;
    padding: 10px 14px;
    text-decoration: none;
    color: black;
}

.dropdown-menu a:hover {
    background-color: #f2f2f2;
}

.profile-dropdown:hover .dropdown-menu {
    display: block;
}

/* Show dropdown on hover */
.category-dropdown:hover .dropdown-menu {
    display: block;
}
    </style>
</head>

<body>

<!-- NAVBAR -->

    <header class="header">
    <div class="logo"><a th:href="@{/users/home}">BuyIT</a></div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="nav-right">
  <div class="category-dropdown">
    <button class="category-btn">Categories ⬇</button>

    <div class="dropdown-menu">
        <a th:each="cat : ${categories}" th:text="${cat}" th:href="@{categories/{category}(category=${cat})}"></a>
    </div>
</div>




        <a th:href="@{/users/deals}">Deals</a>

        <div class="icon cart">
            <a th:href="@{/users/cart}">
            🛒
            <span id="cart-count" th:text="${cartCount}"></span></a>
        </div>
        <div><a th:href="@{/users/orders}">ORDERS</a></div>
        <div class="profile-dropdown">
        <div class="icon">
            👤</div>
            <span class="user-name" th:text="${username}"></span>
            <div class="dropdown-menu">
                <a th:href="@{/users/profile}">Profile</a>
                <a th:href="@{/users/settings}">Settings</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        
        </div>
    </div>
</header>

<div class="page">
    <a href="/users/home" class="back">← Continue Shopping</a>

    <h1>Shopping Cart</h1>

    <div class="layout">

        <!-- CART ITEMS -->
        <div class="cart-box">
            <p th:text="${items} + ' items in cart'"></p>

            <div th:if="${#lists.isEmpty(cartItems) }">
                <p>Your cart is empty.</p>
            </div>
            <div class="cart-item"  th:each="item : ${cartItems}">
                <img th:src="${item.product.imageLink}">

                <div class="cart-info">
                    <h3 th:text="${item.product.name}"></h3>
                    <div class="stock">In Stock</div>

                    <div class="qty">
                        <form th:action="@{/users/cart/decrease}" method="post">
                            <input type="hidden" name="prodId"
                                   th:value="${item.product.prodId}">
                            <button>-</button>
                        </form>

                        <span th:text="${item.quantity}"></span>

                        <form th:action="@{/users/cart/increase}" method="post">
                            <input type="hidden" name="prodId"
                                   th:value="${item.product.prodId}">
                            <button>+</button>
                        </form>
                    </div>

                    <form th:action="@{/users/cart/remove}" method="post">
                        <input type="hidden" name="prodId"
                               th:value="${item.product.prodId}">
                        <div class="remove"><button type="submit">Remove</button></div>
                    </form>
                </div>

                <div class="price-box">
                    <div class="each">
                        ₹ <span th:text="${item.product.price}"></span> each
                    </div>
                    <div class="total">
                        ₹ <span th:text="${item.product.price * item.quantity}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SUMMARY -->
        <div class="summary">
            <h3>Order Summary</h3>

            <div class="row">
                <span>Subtotal</span>
                <span>₹ <span th:text="${total}"></span></span>
            </div>

            <div class="row">
                <span>Shipping</span>
                <span class="green">FREE</span>
            </div>

            <div class="row">
                <span>Estimated Tax</span>
                <span>₹ <span th:text="${0.025*total}"></span></span>
            </div>

            <div class="row total-row">
                <span>Total</span>
                <span>₹ <span th:text="${total + (0.025 * total)}"></span></span>
            </div>

            <a th:href="@{/users/checkout}" th:if="${!(#lists.isEmpty(cartItems))}" ><button class="checkout">Proceed to Checkout</button></a>
            <button class="continue">Continue Shopping</button>

            <div class="features">
                ✔ Secure checkout<br>
                ✔ Free returns within 30 days<br>
                ✔ Warranty included
            </div>
        </div>

    </div>
</div>

</body>
</html>
