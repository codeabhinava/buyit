<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Least Selling Products</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff4f4;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #ff4d4d;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }

        .low {
            background: orange;
        }
                .category-header {
  position: relative;
  background-color: #ff4d4d;
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

.category-header select {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;          
  cursor: pointer;
}

.category-header .arrow {
  margin-left: 5px;
  font-size: 12px;
}

    </style>
</head>
<body>

<h2>📉 Least Selling Products</h2>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Product Name</th>
                   <th class="category-header">
  Category
  <span class="arrow">▼</span>

  <select onchange="location.href = this.value" id="categorySelect">
    <option>---Select---</option>
    <option th:value="@{/admin/bottomsellers}">All</option>
    <option th:each="cat : ${categories}"
            
            th:text="${cat}"
            th:value="@{/admin/bottomsellers/{category}(category=${cat})}">
    </option>
  </select>
</th>
            <th>Price</th>
            <th>Sold Count</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="p, stat : ${products}">
            <td th:text="${stat.count}"></td>
            <td th:text="${p.product.name}"></td>
            <td th:text="${p.product.category}"></td>
            <td th:text="'₹ ' + ${p.product.price}"></td>
            <td>
                <span class="badge low" th:text="${p.quantity}"></span>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
