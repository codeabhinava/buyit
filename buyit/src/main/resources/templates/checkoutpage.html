<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
</head>

<style>body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
}

.container {
    width: 85%;
    margin: auto;
}

.checkout-grid {
    display: flex;
    gap: 30px;
}

.left {
    flex: 2;
}

.right {
    flex: 1;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

.place-order {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 15px;
    cursor: pointer;
}
</style>
<body>

<div class="container">

    <h2>Checkout</h2>

    <div class="checkout-grid">

        <!-- LEFT : ADDRESS + PAYMENT -->
        <div class="left">

            <section class="box">
                <h3>Shipping Address</h3>
<form th:action="@{/users/checkout}" method="post" class="checkout-form">

    <input type="text"
           name="fullname"
           placeholder="Full Name"
           th:value="${address != null ? address.fullname : ''}"
           required>

    <input type="text"
           name="addressLine"
           placeholder="Address Line"
           th:value="${address != null ? address.addressLine : ''}"
           required>

    <input type="text"
           name="city"
           placeholder="City"
           th:value="${address != null ? address.city : ''}"
           required>

    <input type="text"
           name="state"
           placeholder="State"
           th:value="${address != null ? address.state : ''}"
           required>

    <input type="text"
           name="pinCode"
           placeholder="Pincode"
           th:value="${address != null ? address.pinCode : ''}"
           required>

    <input type="text"
           name="phoneNumber"
           placeholder="Phone Number"
           th:value="${address != null ? address.phoneNumber : ''}"
           required>

    <label class="save-address">
        <input type="checkbox" name="saveAddress" value="true">
        Save this address for future orders
    </label>

    <button type="submit">Save Address</button>
</form>


            </section>
        
            <section class="box">
                <h3>Payment Method</h3>

                <label>
                    <input type="radio" name="payment" checked>
                    Cash on Delivery
                </label>

                <label>
                    <input type="radio" name="payment">
                    UPI / Card (Mock)
                </label>
            </section>

        </div>

        <!-- RIGHT : ORDER SUMMARY -->
        <div class="right box">

            <h3>Order Summary</h3>

            <div th:each="item : ${cartItems}" class="summary-item">
                <span th:text="${item.product.name}"></span>
                <span>₹ <span th:text="${item.product.price * item.quantity}"></span></span>
            </div>

            <hr>

            <div class="row">
                <span>Subtotal</span>
                <span>₹ <span th:text="${total}"></span></span>
            </div>

            <div class="row">
                <span>Tax</span>
                <span>₹ <span th:text="${0.025*total}"></span></span>
            </div>

            <div class="row total">
                <span>Total</span>
                <span>₹ <span th:text="${total+(0.025*total)}"></span></span>
            </div>

            <a th:href="@{/users/placeorder}">
                <button type="submit" class="place-order">
                    Place Order
                </button>
            </a>
        </div>

    </div>
</div>

</body>
</html>
