<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Placed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-card {
            background: white;
            padding: 40px;
            width: 420px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tick {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .tick span {
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .order-id {
            background: #f1f3f6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .actions a {
            display: block;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .home {
            background: black;
            color: white;
        }

        .orders {
            border: 1px solid #ccc;
            color: black;
        }
    </style>
</head>
<body>

<div class="success-card">

    <div class="tick">
        <span>✓</span>
    </div>

    <h2>Order Placed Successfully</h2>

    <p>
        Thank you for your purchase!  
        Your order has been confirmed and will be shipped soon.
    </p>

    <!-- Optional -->
    <div class="order-id">
        Order ID: <strong><p th:text="${orderid}"></p></strong>
    </div>

    <div class="actions">
        <a href="/users/home" class="home">Continue Shopping</a>
        <a th:href="@{/users/orders}" class="orders">View My Orders</a>
    </div>

</div>

</body>
</html>
